{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <h2 class="text-warning mb-4 fw-bold text-center">WAITER DASHBOARD</h2>

        <div class="card bg-black border-warning shadow-lg mb-5">
            <div class="card-body p-4">
                <h4 class="text-warning mb-4">Add Points for Customer</h4>
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="phone_number" class="form-label">Customer Phone Number</label>
                            <input type="text" class="form-control bg-dark text-light border-secondary" id="phone_number" name="phone_number" required placeholder="e.g. 0712345678">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="receipt_number" class="form-label">Receipt Number</label>
                            <input type="text" class="form-control bg-dark text-light border-secondary" id="receipt_number" name="receipt_number" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="amount" class="form-label">Total Amount (KES)</label>
                        <input type="number" step="0.01" class="form-control bg-dark text-light border-secondary" id="amount" name="amount" required>
                        <small class="text-muted">1 point per 100 KES. Visits >= 2000 count towards free meal.</small>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-warning fw-bold">ADD POINTS</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card bg-black border-warning shadow-lg mb-5">
            <div class="card-body p-4">
                <h4 class="text-warning mb-4">Redeem 10th Visit Free Meal</h4>
                <form action="{{ url_for('redeem_free_meal') }}" method="POST">
                    <div class="mb-3">
                        <label for="redeem_phone" class="form-label">Customer Phone Number</label>
                        <input type="text" class="form-control bg-dark text-light border-secondary" id="redeem_phone" name="phone_number" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-outline-warning fw-bold">REDEEM FREE MEAL</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card bg-black border-secondary">
            <div class="card-body p-4">
                <h4 class="text-warning mb-3">Recent Points Activity</h4>
                <p class="text-muted">History of points you've added today will appear here.</p>
                <!-- Transaction history could be added here later -->
            </div>
        </div>
    </div>
</div>
{% endblock %}
