{% extends 'base.html' %}
{% block content %}
<div class="row g-4 justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 border-orange">
            <div class="text-center mb-4">
                <i class="fas fa-receipt text-orange fs-1 mb-2"></i>
                <h2 class="h3 fw-bold text-white mb-0">Claim Your Points</h2>
                <p class="text-white-50 small">Enter details from your printed receipt</p>
            </div>

            <div class="alert bg-black border border-dark text-white-50 small mb-4 py-3">
                <i class="fas fa-info-circle text-orange me-2"></i>
                Find your 8-digit secure code at the bottom of your Hash Grill receipt.
            </div>

            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label small text-white-50">Receipt Number</label>
                    <input type="text" name="receipt_number" class="form-control text-uppercase" placeholder="REC-XXXXX" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small text-white-50">8-Digit Secure Code</label>
                    <input type="text" name="secure_code" class="form-control text-uppercase" placeholder="A1B2C3D4" maxlength="8" required>
                </div>
                <button type="submit" class="btn btn-orange w-100 py-3 fw-bold">Verify & Add Points</button>
                <a href="{{ url_for('customer_dashboard') }}" class="btn btn-link text-white-50 w-100 mt-3 text-decoration-none small">
                    <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
