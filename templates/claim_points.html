{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card bg-black border-warning shadow-lg">
            <div class="card-body p-5">
                <h2 class="text-center text-warning mb-4 fw-bold">CLAIM POINTS</h2>
                <p class="text-muted text-center mb-4">Enter the details from your receipt to add points to your account.</p>

                <form method="POST">
                    <div class="mb-3">
                        <label for="receipt_number" class="form-label">Receipt Number</label>
                        <input type="text" class="form-control bg-dark text-light border-secondary" id="receipt_number" name="receipt_number" required placeholder="e.g. REC-12345">
                    </div>
                    <div class="mb-4">
                        <label for="secure_code" class="form-label">Secure Claim Code</label>
                        <input type="text" class="form-control bg-dark text-light border-secondary" id="secure_code" name="secure_code" required placeholder="8-character code from receipt">
                        <small class="text-muted">Check the bottom of your receipt for the loyalty claim code.</small>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-warning fw-bold">CLAIM POINTS</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
