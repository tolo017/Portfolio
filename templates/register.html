{% extends 'base.html' %}
{% block content %}
<div class="row g-4 justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 border-orange shadow-lg">
            <div class="text-center mb-4">
                <i class="fas fa-user-plus text-orange fs-1 mb-2"></i>
                <h2 class="h3 fw-bold text-white mb-0">Join Loyalty</h2>
                <p class="text-white-50 small">Start earning points at Hash Grill</p>
            </div>

            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label small text-white-50">Full Name</label>
                    <input type="text" name="name" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small text-white-50">Phone Number</label>
                    <input type="text" name="phone_number" class="form-control" placeholder="07XXXXXXXX" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small text-white-50">Create Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-orange w-100 py-3 fw-bold">Create Account</button>
            </form>

            <div class="text-center mt-4 pt-3 border-top border-dark">
                <span class="text-white-50 small">Already a member?</span>
                <a href="{{ url_for('login') }}" class="text-orange text-decoration-none fw-bold ms-1">Login Here</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
