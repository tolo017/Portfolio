{% extends 'base.html' %}
{% block content %}
<div class="row g-4 justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 border-orange shadow-lg">
            <div class="text-center mb-4">
                <i class="fas fa-lock text-orange fs-1 mb-2"></i>
                <h2 class="h3 fw-bold text-white mb-0">Secure Login</h2>
                <p class="text-white-50 small">Access your Hash Grill Rewards</p>
            </div>

            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label small text-white-50">Phone Number</label>
                    <div class="input-group">
                        <span class="input-group-text bg-black border-dark text-orange"><i class="fas fa-phone"></i></span>
                        <input type="text" name="phone_number" class="form-control" placeholder="07XXXXXXXX" required autofocus>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label small text-white-50">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-black border-dark text-orange"><i class="fas fa-key"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-orange w-100 py-3 fw-bold">Login to Dashboard</button>
            </form>

            <div class="text-center mt-4 pt-3 border-top border-dark">
                <span class="text-white-50 small">Not a member?</span>
                <a href="{{ url_for('register') }}" class="text-orange text-decoration-none fw-bold ms-1">Join Loyalty</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
